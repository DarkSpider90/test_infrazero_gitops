apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/DarkSpider90/test_infrazero_gitops
    targetRevision: main
    path: clusters/dev
    kustomize:
      buildOptions: --load-restrictor LoadRestrictionsNone
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
