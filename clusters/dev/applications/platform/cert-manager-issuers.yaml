apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-issuers
  namespace: argocd
spec:
  project: cluster-dev
  source:
    repoURL: https://github.com/DarkSpider90/test_infrazero_gitops
    targetRevision: main
    path: platform/cert-manager
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
